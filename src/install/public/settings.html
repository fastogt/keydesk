<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>KeyDesk - Settings</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/sidebar.css">
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>
  <div class="sidebar" id="sidebar"></div>
  <div class="page-content">
    <div class="page-header">
      <h1>Settings</h1>
    </div>
    <div class="page-body" style="max-width:600px">
      <h3>Profile</h3>
      <form id="profileForm" style="margin-top:12px">
        <div class="field"><label>Name</label><input id="profileName"></div>
        <div class="field"><label>Email</label><input id="profileEmail" type="email"></div>
        <button type="submit" class="btn btn-primary">Save</button>
      </form>

      <h3 style="margin-top:32px">Change Password</h3>
      <form id="passwordForm" style="margin-top:12px">
        <div class="field"><label>Current password</label><input id="currentPassword" type="password" required></div>
        <div class="field"><label>New password</label><input id="newPassword" type="password" required></div>
        <div class="field"><label>Confirm new password</label><input id="confirmPassword" type="password" required></div>
        <button type="submit" class="btn btn-primary">Change Password</button>
      </form>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script type="module" src="/js/settings.js"></script>
</body>
</html>
