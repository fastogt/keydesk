name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Type-check frontend
        working-directory: src/frontend
        run: npm run check

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Generate version
        run: |
          PROJECT_NAME_LOWERCASE=keydesk \
          PROJECT_VERSION=1.0.0.1 \
          PROJECT_VERSION_GIT=$(git rev-parse --short=8 HEAD) \
          SHARE_INSTALL_DESTINATION=/usr/share/keydesk \
          RUN_DIR_PATH=/var/run/keydesk \
          PIDFILE_PATH=/var/run/keydesk/keydesk.pid \
          CONFIG_PATH=/etc/keydesk.conf \
          OUTPUT_FILE=src/app/version/version.go \
          ./scripts/generate_version.sh

      - name: Go mod tidy
        working-directory: src
        run: go mod tidy

      - name: Go vet
        working-directory: src
        run: go vet ./...

      - name: Go build
        working-directory: src
        run: go build -o ../build/bin/keydesk ./cmd/keydesk.go

      - name: Go test
        working-directory: src
        run: go test ./...
